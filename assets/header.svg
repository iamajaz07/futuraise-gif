<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#e94560" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>

  <!-- neural-net decoration -->
  <g stroke="#e94560" stroke-opacity="0.18" stroke-width="1">
    <line x1="60" y1="50" x2="150" y2="110"/><line x1="150" y1="110" x2="90" y2="180"/>
    <line x1="150" y1="110" x2="250" y2="70"/><line x1="250" y1="70" x2="330" y2="150"/>
    <line x1="1140" y1="60" x2="1050" y2="120"/><line x1="1050" y1="120" x2="1110" y2="185"/>
    <line x1="1050" y1="120" x2="950" y2="75"/><line x1="950" y1="75" x2="870" y2="160"/>
  </g>
  <g fill="#e94560" fill-opacity="0.45">
    <circle cx="60" cy="50" r="4"/><circle cx="150" cy="110" r="5"/><circle cx="90" cy="180" r="3.5"/>
    <circle cx="250" cy="70" r="4"/><circle cx="330" cy="150" r="3.5"/>
    <circle cx="1140" cy="60" r="4"/><circle cx="1050" cy="120" r="5"/><circle cx="1110" cy="185" r="3.5"/>
    <circle cx="950" cy="75" r="4"/><circle cx="870" cy="160" r="3.5"/>
  </g>

  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="105" font-size="52" font-weight="700" fill="#e94560" opacity="0">
      Azaj Ahamed Patel
      <animate attributeName="opacity" from="0" to="1" dur="1.2s" fill="freeze"/>
    </text>
    <text x="600" y="145" font-size="21" font-weight="400" fill="#ffffff" letter-spacing="2" opacity="0">
      DATA SCIENTIST&#160;&#160;|&#160;&#160;AI &amp; AUTOMATION ENGINEER
      <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="0.5s" fill="freeze"/>
    </text>
  </g>

  <path d="M0,190 C200,165 400,215 600,195 C800,175 1000,215 1200,185 L1200,220 L0,220 Z" fill="url(#wave)">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
      values="M0,190 C200,165 400,215 600,195 C800,175 1000,215 1200,185 L1200,220 L0,220 Z;
              M0,185 C200,215 400,170 600,200 C800,220 1000,175 1200,195 L1200,220 L0,220 Z;
              M0,190 C200,165 400,215 600,195 C800,175 1000,215 1200,185 L1200,220 L0,220 Z"/>
  </path>
</svg>
